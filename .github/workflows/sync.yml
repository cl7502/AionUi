name: Sync Fork (Mirror)

on:
  schedule:
    - cron: "0 */6 * * *"   # 每6小时
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Mirror upstream repository
        run: |
          set -e

          UPSTREAM="https://github.com/cl7502/AionUi.git"
          TARGET="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"

          echo "Cloning upstream..."
          git clone --mirror $UPSTREAM repo

          cd repo

          echo "Setting push target..."
          git remote set-url --push origin $TARGET

          echo "Mirroring everything (branches + tags)..."
          git push --mirror